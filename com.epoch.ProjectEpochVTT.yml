# Project Epoch VTT — Flatpak manifest
#
# BEFORE BUILDING — generate the offline npm source archive:
#
#   pip install flatpak-node-generator
#   flatpak-node-generator --electron-node-headers \
#     npm package-lock.json \
#     -o generated-sources.json
#
# The --electron-node-headers flag fetches the Electron 33 node headers
# (node-v33.0.0-headers.tar.gz, ABI 130) and caches them under
# flatpak-node/ so node-gyp can rebuild better-sqlite3 offline.
# Without this step the build needs internet access to reach
# https://electronjs.org/headers/v33.0.0/ during the rebuild.
#
# BUILD:
#   flatpak-builder --user --install --force-clean _build com.epoch.ProjectEpochVTT.yml
#
# REQUIRED FLATPAK REMOTES (add once):
#   flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
#   flatpak install flathub org.freedesktop.Platform/x86_64/24.08
#   flatpak install flathub org.freedesktop.Sdk/x86_64/24.08
#   flatpak install flathub org.electronjs.Electron2.BaseApp/x86_64/24.08
#   flatpak install flathub org.freedesktop.Sdk.Extension.node22/x86_64/24.08

app-id: com.epoch.ProjectEpochVTT
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk

# Electron2.BaseApp bundles the zypak sandbox shim that redirects /dev/shm to
# $XDG_RUNTIME_DIR so Chromium's shared-memory allocator works on ostree/immutable
# distros (Bazzite, Silverblue, Aurora) without --disable-dev-shm-usage.
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'

sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22

command: run.sh
separate-locales: false

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --share=network           # relay WebSocket + on-demand image URLs
  - --device=dri              # hardware-accelerated canvas rendering
  - --filesystem=home         # read/write game data the user selects
  - --talk-name=org.freedesktop.Notifications

build-options:
  # Node 22 and npm from the SDK extension
  append-path: /usr/lib/sdk/node22/bin
  env:
    npm_config_cache: /run/build/project-epoch-vtt/flatpak-node/npm-cache
    npm_config_nodedir: /usr/lib/sdk/node22
    XDG_CACHE_HOME: /run/build/project-epoch-vtt/flatpak-node/xdg-cache
    # Prevent npm postinstall scripts from trying to download the Electron binary;
    # we supply the pre-verified zip as a manifest source instead.
    ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

modules:
  - name: project-epoch-vtt
    buildsystem: simple
    sources:
      # ── App source ────────────────────────────────────────────────────────
      - type: git
        url: https://github.com/entaiho77/project-epoch-vtt.git
        # Pin to a release commit / tag before shipping to users.
        branch: main

      # ── Pre-verified Electron binary ──────────────────────────────────────
      # SHA-256 from https://github.com/electron/electron/releases/tag/v33.0.0
      - type: file
        url: https://github.com/electron/electron/releases/download/v33.0.0/electron-v33.0.0-linux-x64.zip
        sha256: 497ff71b2cacfc0a001fcfd3d852fd758e20604622ddfa2932dc32074c48af66
        dest: flatpak-electron
        dest-filename: electron-v33.0.0-linux-x64.zip

      # ── Offline npm packages (generated; not committed) ───────────────────
      # Generate with:
      #   flatpak-node-generator --electron-node-headers npm package-lock.json
      - generated-sources.json

    build-commands:
      # ── 1. Install npm dependencies (fully offline) ───────────────────────
      - npm ci --offline --ignore-scripts

      # ── 2. Rebuild better-sqlite3 for Electron 33 ABI ────────────────────
      # Root cause of the ABI mismatch:
      #   build-options.env sets npm_config_nodedir=/usr/lib/sdk/node22
      #   → node-gyp uses Node 22 headers (module ABI 127)
      #   → Electron 33 binary loads the .node and crashes (it needs ABI 130)
      # Fix: unset npm_config_nodedir so node-gyp resolves headers via
      # --dist-url instead. In an online build it fetches them from the net;
      # in an offline build they come from the XDG cache staged by the
      # generated-sources.json entry added by flatpak-node-generator.
      # Note: better-sqlite3 is hoisted to root node_modules/ by npm workspaces,
      # so no --prefix is needed — the rebuild runs at the workspace root.
      - |
        unset npm_config_nodedir
        npm rebuild better-sqlite3 \
          --runtime=electron \
          --target=33.0.0 \
          --dist-url=https://electronjs.org/headers \
          --build-from-source

      # ── 3. Build JS bundles (electron-vite: main + preload + renderer) ────
      - npm run build -w @epoch/desktop

      # ── 4. Extract and install Electron binary ────────────────────────────
      - mkdir -p /app/epoch-vtt
      - unzip flatpak-electron/electron-v33.0.0-linux-x64.zip -d /app/epoch-vtt
      - chmod +x /app/epoch-vtt/electron

      # ── 5. Install app as a raw directory (not asar) ─────────────────────
      # Raw directory required so Node.js can dlopen the native better_sqlite3.node
      # binary at runtime; asar packaging would block that.
      - mkdir -p /app/epoch-vtt/resources/app/node_modules
      - cp -r apps/desktop/out       /app/epoch-vtt/resources/app/out
      - cp apps/desktop/package.json /app/epoch-vtt/resources/app/package.json
      # ws and all other pure-JS deps are bundled into out/main/index.js by
      # electron-vite (externalizeDepsPlugin was removed from the main config).
      # Only the native-addon chain needs to ship as raw node_modules:
      #   better-sqlite3  — native .node file, can't be inlined by Rollup
      #   bindings        — locates the .node file at runtime (dep of better-sqlite3)
      #   file-uri-to-path — used by bindings for file:// URI resolution
      - cp -r node_modules/better-sqlite3  /app/epoch-vtt/resources/app/node_modules/
      - cp -r node_modules/bindings        /app/epoch-vtt/resources/app/node_modules/
      - cp -r node_modules/file-uri-to-path /app/epoch-vtt/resources/app/node_modules/

      # ── 6. Desktop integration ────────────────────────────────────────────
      - install -Dm755 build-aux/flatpak/run.sh /app/bin/run.sh
      - install -Dm644 build-aux/flatpak/com.epoch.ProjectEpochVTT.desktop
          /app/share/applications/com.epoch.ProjectEpochVTT.desktop

      # App icon — place a 512×512 PNG at apps/desktop/assets/icon.png
      # before submitting to Flathub.
      - |
        if [ -f apps/desktop/assets/icon.png ]; then
          install -Dm644 apps/desktop/assets/icon.png \
            /app/share/icons/hicolor/512x512/apps/com.epoch.ProjectEpochVTT.png
        fi
